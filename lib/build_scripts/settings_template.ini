; ---------------------------
; Hotkey notation reference:
; ^ = Ctrl   ? e.g. ^h means Ctrl + H
; ! = Alt    ? e.g. !h means Alt + H
; + = Shift  ? e.g. +h means Shift + H
; # = Win    ? e.g. #h means Win + H
; 
; LButton / RButton / MButton for mouse buttons
; ---------------------------

; === vaultOps Options.. Ignore if your script is standalone === 
[Options]
NoSave=0
scriptsEnabled=0
heist=1
FingerprintMode=0
Delay=40

; === Below are the vaultOps hotkeys.. Ignore if your script is standalone === 
[ToolHotkeys]
NoSave=]
ToggleScripts=[
; Send the PgUp key, used for the Cayo Perico heist.
; Can be set to any key or mouse button based on the notation reference above.
SendPgUp=LButton

[Hotkeys]
; Enter manual mode for fingerprint/keypad.
Manual=m
; Instantly solve fingerprint/keypad (auto mode).
AutoHack=h
; Reset the script's progress and state.
Reset=r
; Terminate the script completely (For standalone scripts only).
Terminate=t
